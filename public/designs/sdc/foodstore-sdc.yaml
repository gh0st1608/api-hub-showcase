openapi: 3.0.3
info:
  title: Foodstore SDC API Hub
  version: 1.0.0
  description: |
    Catalog sample for the Foodstore backend hub.
    This document groups representative endpoints for auth, shop, order,
    payment and checkout so the showcase can render a complete Redoc page.
servers:
  - url: https://api.foodstore.example.com
    description: Production
  - url: https://sandbox.foodstore.example.com
    description: Sandbox
tags:
  - name: Auth
    description: Authentication and session management endpoints.
  - name: Shop
    description: Product and catalog endpoints.
  - name: Order
    description: Order lifecycle endpoints.
  - name: Payment
    description: Payment intent and confirmation endpoints.
  - name: Checkout
    description: Checkout orchestration endpoints.
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate a customer
      operationId: loginCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "401":
          description: Invalid credentials
  /shop/products:
    get:
      tags: [Shop]
      summary: List published products
      operationId: listProducts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductCollection"
  /orders/{orderId}:
    get:
      tags: [Order]
      summary: Retrieve order details
      operationId: getOrderById
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
  /payments/intents:
    post:
      tags: [Payment]
      summary: Create a payment intent
      operationId: createPaymentIntent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentIntentRequest"
      responses:
        "201":
          description: Payment intent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntent"
  /checkout/sessions:
    post:
      tags: [Checkout]
      summary: Start a checkout session
      operationId: createCheckoutSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutSessionRequest"
      responses:
        "201":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"
components:
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    AuthTokenResponse:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          example: 3600
    Product:
      type: object
      required: [id, name, price, currency]
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
          format: float
        currency:
          type: string
          example: USD
    ProductCollection:
      type: object
      required: [items, page, limit, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
    Order:
      type: object
      required: [id, status, total, currency]
      properties:
        id:
          type: string
        status:
          type: string
          example: CREATED
        total:
          type: number
          format: float
        currency:
          type: string
          example: USD
    PaymentIntentRequest:
      type: object
      required: [orderId, amount, currency]
      properties:
        orderId:
          type: string
        amount:
          type: number
          format: float
        currency:
          type: string
    PaymentIntent:
      type: object
      required: [id, status, clientSecret]
      properties:
        id:
          type: string
        status:
          type: string
          example: REQUIRES_CONFIRMATION
        clientSecret:
          type: string
    CheckoutSessionRequest:
      type: object
      required: [cartId, customerId]
      properties:
        cartId:
          type: string
        customerId:
          type: string
    CheckoutSession:
      type: object
      required: [id, expiresAt, paymentIntentId]
      properties:
        id:
          type: string
        expiresAt:
          type: string
          format: date-time
        paymentIntentId:
          type: string
