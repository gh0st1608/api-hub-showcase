version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Instalando dependencias.."
      - cd claim-cargocom
      - npm install

  build:
    commands:
      - echo "Ejecutando build.."
      - npm run build
      - npm run build-html

  post_build:
    commands:
      - echo "Copiando archivos a S3.."
      - aws s3 cp dist/ s3://apihub-designs/ --recursive
      - echo "Haciendo público el HTML..."
      - aws s3api put-object-acl --bucket apihub-designs --key claim-cargocom.html --acl public-read

artifacts:
  files:
    - '**/*'
  base-directory: claim-cargocom/dist