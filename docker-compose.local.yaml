services:
  frontend:
    build:
      context: .
      args:
        VITE_API_BASE_URL: http://localhost:3001
        VITE_APP_NAME: "Frontend Web React"
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-c", "node backend/provisional-server.js"]
    volumes:
      - .:/app
    ports:
      - "3001:3001"
