parameters:
  - $ref: ../components/parameters/Channel.yaml
  - $ref: ../components/parameters/ApiKey.yaml
  - name: orderId
    in: path
    description: Identificador unico del recurso Order.
    required: true
    schema:
      type: string
      format: uuid
      minLength: 36
      maxLength: 36
      pattern: '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
      example: 62977d46-7a50-41c9-8d84-38272ac2a8df
  - name: courierId
    in: path
    description: Identificador unico del recurso Courier.
    required: true
    schema:
      type: string
      format: uuid
      minLength: 36
      maxLength: 36
      pattern: '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
      example: a0271854-eed8-486d-9ab4-74ef822aa1f4

get:
  summary: Assign Courier To Order
  operationId: assignCourierToOrder
  description: >
    Procesos: Asignacion manual de courier a una orden.


    Funcionalidad: Vincular el pedido con un courier disponible.


    Objetivo: Permitir control operativo del despacho.


    Comentarios:

  tags:
    - Orders

  responses:
    '200':
      $ref: ../components/responses/AssignCourierResponse.yaml
    '400':
      $ref: ../components/statusCodes/BadRequestResponse.yaml
    '401':
      $ref: ../components/statusCodes/UnauthorizedResponse.yaml
    '403':
      $ref: ../components/statusCodes/ForbiddenResponse.yaml
    '404':
      $ref: ../components/statusCodes/NotFoundResponse.yaml
    '407':
      $ref: ../components/statusCodes/ProxyAuthenticationResponse.yaml
    '409':
      $ref: ../components/statusCodes/ConflictResponse.yaml
    '411':
      $ref: ../components/statusCodes/LengthRequiredResponse.yaml
    '414':
      $ref: ../components/statusCodes/UriTooLongResponse.yaml
    '429':
      $ref: ../components/statusCodes/TooManyRequestsResponse.yaml
    '500':
      $ref: ../components/statusCodes/InternalServerErrorResponse.yaml
    default:
      $ref: ../components/statusCodes/UnexpectedErrorResponse.yaml
  security:
    - api_key: []
