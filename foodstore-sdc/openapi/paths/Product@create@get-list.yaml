parameters:
  - $ref: ../components/parameters/Channel.yaml
  - $ref: ../components/parameters/ApiKey.yaml

post:
  summary: Create Product
  operationId: createProduct
  description: >
    Procesos: Creacion de un producto nuevo.


    Funcionalidad: Registrar un producto con sus datos comerciales e ingredientes.


    Objetivo: Incorporar productos al catalogo del comercio.


    Comentarios:

  tags:
    - Products

  requestBody:
    $ref: ../components/requestBodies/CreateProductReq.yaml

  responses:
    '200':
      $ref: ../components/responses/CreateProductResponse.yaml
    '400':
      $ref: ../components/statusCodes/BadRequestResponse.yaml
    '401':
      $ref: ../components/statusCodes/UnauthorizedResponse.yaml
    '403':
      $ref: ../components/statusCodes/ForbiddenResponse.yaml
    '404':
      $ref: ../components/statusCodes/NotFoundResponse.yaml
    '407':
      $ref: ../components/statusCodes/ProxyAuthenticationResponse.yaml
    '409':
      $ref: ../components/statusCodes/ConflictResponse.yaml
    '411':
      $ref: ../components/statusCodes/LengthRequiredResponse.yaml
    '414':
      $ref: ../components/statusCodes/UriTooLongResponse.yaml
    '429':
      $ref: ../components/statusCodes/TooManyRequestsResponse.yaml
    '500':
      $ref: ../components/statusCodes/InternalServerErrorResponse.yaml
    default:
      $ref: ../components/statusCodes/UnexpectedErrorResponse.yaml
  security:
    - api_key: []

get:
  summary: Get Products
  operationId: getProducts
  description: >
    Procesos: Consulta paginada de productos.


    Funcionalidad: Recuperar productos por texto, categoria y cursor.


    Objetivo: Exponer el catalogo del negocio de forma consultable.


    Comentarios:

  tags:
    - Products

  parameters:
    - $ref: ../components/parameters/Search.yaml
    - $ref: ../components/parameters/Limit.yaml
    - $ref: ../components/parameters/Cursor.yaml
    - $ref: ../components/parameters/CategoryId.yaml

  responses:
    '200':
      $ref: ../components/responses/GetProductsResponse.yaml
    '400':
      $ref: ../components/statusCodes/BadRequestResponse.yaml
    '401':
      $ref: ../components/statusCodes/UnauthorizedResponse.yaml
    '403':
      $ref: ../components/statusCodes/ForbiddenResponse.yaml
    '404':
      $ref: ../components/statusCodes/NotFoundResponse.yaml
    '407':
      $ref: ../components/statusCodes/ProxyAuthenticationResponse.yaml
    '409':
      $ref: ../components/statusCodes/ConflictResponse.yaml
    '411':
      $ref: ../components/statusCodes/LengthRequiredResponse.yaml
    '414':
      $ref: ../components/statusCodes/UriTooLongResponse.yaml
    '429':
      $ref: ../components/statusCodes/TooManyRequestsResponse.yaml
    '500':
      $ref: ../components/statusCodes/InternalServerErrorResponse.yaml
    default:
      $ref: ../components/statusCodes/UnexpectedErrorResponse.yaml
  security:
    - api_key: []
