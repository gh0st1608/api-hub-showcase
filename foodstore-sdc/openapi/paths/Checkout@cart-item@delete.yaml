parameters:
  - $ref: ../components/parameters/Channel.yaml
  - $ref: ../components/parameters/ApiKey.yaml
  - name: userId
    in: path
    description: Identificador unico del usuario asociado al carrito.
    required: true
    schema:
      type: string
      format: uuid
      minLength: 36
      maxLength: 36
      pattern: '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
      example: 0af43a51-a4f0-4f7d-a798-2372456d6a19
  - name: productId
    in: path
    description: Identificador unico del producto dentro del carrito.
    required: true
    schema:
      type: string
      format: uuid
      minLength: 36
      maxLength: 36
      pattern: '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
      example: 3d808990-5158-4af0-8a24-9326f59419a2

delete:
  summary: Remove Item From Cart
  operationId: removeItemFromCart
  description: >
    Procesos: Eliminacion de item del carrito.


    Funcionalidad: Retirar un producto del checkout del usuario.


    Objetivo: Ajustar el contenido del pedido antes del pago.


    Comentarios:

  tags:
    - Checkouts

  responses:
    '200':
      $ref: ../components/responses/RemoveCartItemResponse.yaml
    '400':
      $ref: ../components/statusCodes/BadRequestResponse.yaml
    '401':
      $ref: ../components/statusCodes/UnauthorizedResponse.yaml
    '403':
      $ref: ../components/statusCodes/ForbiddenResponse.yaml
    '404':
      $ref: ../components/statusCodes/NotFoundResponse.yaml
    '407':
      $ref: ../components/statusCodes/ProxyAuthenticationResponse.yaml
    '409':
      $ref: ../components/statusCodes/ConflictResponse.yaml
    '411':
      $ref: ../components/statusCodes/LengthRequiredResponse.yaml
    '414':
      $ref: ../components/statusCodes/UriTooLongResponse.yaml
    '429':
      $ref: ../components/statusCodes/TooManyRequestsResponse.yaml
    '500':
      $ref: ../components/statusCodes/InternalServerErrorResponse.yaml
    default:
      $ref: ../components/statusCodes/UnexpectedErrorResponse.yaml
  security:
    - api_key: []
