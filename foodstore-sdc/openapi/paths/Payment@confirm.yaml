post:
  summary: Confirm Payment
  operationId: confirmPayment
  description: >
    Procesos: Confirmacion del pago procesado en Paypal.


    Funcionalidad: Capturar la orden externa y actualizar el estado local del pago.


    Objetivo: Finalizar el flujo de cobro.


    Comentarios:

  tags:
