type: object
description: Esquema para crear una categoria.
properties:
  Data:
    type: object
    properties:
      Category:
        type: object
        properties:
          name:
            type: string
            example: Hamburguesas
          description:
            type: string
            example: Categoria de hamburguesas y sandwiches
          image:
            type: string
            format: uri
            example: https://cdn.foodstore.com/categories/hamburguesas.png
        required:
          - name
          - description
    required:
      - Category
required:
  - Data
