type: object
description: Esquema para confirmar un pago de Paypal.
properties:
  Data:
    type: object
    properties:
      Payment:
        type: object
        properties:
          token:
            type: string
            example: 8S123456AB123456C
          PayerID:
            type: string
            example: ABCD1234EFGH
          provider:
            type: string
            enum: [Paypal, Stripe]
            example: Paypal
        required:
          - token
          - PayerID
          - provider
    required:
      - Payment
required:
  - Data
