type: object
description: Esquema para crear un producto.
properties:
  Data:
    type: object
    properties:
      Product:
        type: object
        properties:
          name:
            type: string
            example: Hamburguesa Clasica
          description:
            type: string
            example: Hamburguesa artesanal con queso cheddar
          categoryId:
            $ref: ../attributes/id.yaml
          storeId:
            $ref: ../attributes/id.yaml
          price:
            type: number
            format: double
            example: 24.9
          currency:
            type: string
            example: PEN
          stock:
            type: number
            format: double
            example: 35
          ingredients:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                  example: Carne
                quantity:
                  type: number
                  format: double
                  example: 180
                unit:
                  type: string
                  enum: [g, kg, ml, l, unit]
                  example: g
                image:
                  type: string
                  format: uri
                  example: https://cdn.foodstore.com/ingredients/carne.png
              required:
                - name
                - quantity
                - unit
        required:
          - name
          - description
          - categoryId
          - storeId
          - price
    required:
      - Product
required:
  - Data
