type: object
description: Esquema para autenticar un usuario con credenciales.
properties:
  Data:
    type: object
    properties:
      Auth:
        type: object
        properties:
          authType:
            type: string
            description: Tipo de autenticacion soportado por el microservicio.
            enum: [password]
            example: password
          email:
            type: string
            format: email
            example: user@foodstore.com
          password:
            type: string
            minLength: 8
            maxLength: 128
            example: Password123!
          captchaToken:
            type: string
            description: Token de captcha opcional.
            example: 03AGdBq24-example-token
        required:
          - authType
          - email
          - password
    required:
      - Auth
required:
  - Data
