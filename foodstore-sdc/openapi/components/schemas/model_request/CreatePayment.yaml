type: object
description: Esquema para registrar un pago.
properties:
  Data:
    type: object
    properties:
      Payment:
        type: object
        properties:
          orderId:
            $ref: ../attributes/id.yaml
          amount:
            type: number
            format: double
            example: 49.8
          currency:
            type: string
            example: USD
          provider:
            type: string
            enum: [Paypal, Stripe]
            example: Paypal
          providerOrderId:
            type: string
            example: 8S123456AB123456C
        required:
          - orderId
          - amount
          - currency
          - provider
    required:
      - Payment
required:
  - Data
