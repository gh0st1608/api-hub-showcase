type: object
description: Esquema para crear una orden de delivery.
properties:
  Data:
    type: object
    properties:
      Order:
        type: object
        properties:
          userId:
            $ref: ../attributes/id.yaml
          storeId:
            $ref: ../attributes/id.yaml
          deliveryLat:
            type: number
            format: double
            example: -12.0505
          deliveryLng:
            type: number
            format: double
            example: -77.0332
          items:
            type: array
            minItems: 1
            items:
              type: object
              properties:
                productId:
                  $ref: ../attributes/id.yaml
                name:
                  type: string
                  example: Hamburguesa Clasica
                price:
                  type: number
                  format: double
                  example: 24.9
                quantity:
                  type: number
                  format: double
                  example: 2
              required:
                - productId
                - name
                - price
                - quantity
        required:
          - userId
          - storeId
          - items
    required:
      - Order
required:
  - Data
