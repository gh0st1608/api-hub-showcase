type: object
description: Esquema para actualizar la contrasena de un usuario validado.
properties:
  Data:
    type: object
    properties:
      User:
        type: object
        properties:
          email:
            type: string
            format: email
            example: user@foodstore.com
          password:
            type: string
            minLength: 8
            maxLength: 128
            example: NewPassword123!
        required:
          - email
          - password
    required:
      - User
required:
  - Data
