type: object
description: Devuelve una lista paginada de categorias.
properties:
  Data:
    type: object
    properties:
      items:
        type: array
        items:
          type: object
          properties:
            categoryId:
              $ref: ../attributes/id.yaml
            name:
              type: string
              example: Hamburguesas
            description:
              type: string
              example: Categoria de hamburguesas y sandwiches
            image:
              type: string
              example: https://cdn.foodstore.com/categories/hamburguesas.png
            active:
              type: boolean
              example: true
            createdAt:
              type: string
              format: date-time
              example: '2026-05-24T18:30:00Z'
            updatedAt:
              type: string
              format: date-time
              nullable: true
              example: null
            deletedAt:
              type: string
              format: date-time
              nullable: true
              example: null
      count:
        type: integer
        example: 1
      nextCursor:
        type: string
        nullable: true
        example: null
      statusCode:
        $ref: ../attributes/code.yaml
      message:
        $ref: ../attributes/message.yaml
    required:
      - items
      - count
      - statusCode
      - message
