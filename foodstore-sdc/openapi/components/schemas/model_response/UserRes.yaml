type: object
description: Devuelve la informacion del usuario.
properties:
  Data:
    type: object
    properties:
      user:
        type: object
        properties:
          userId:
            $ref: ../attributes/id.yaml
          name:
            type: string
            example: Juan Perez
          lastname:
            type: string
            example: Aguilar
          email:
            type: string
            format: email
            example: user@foodstore.com
          roles:
            type: string
            example: user
          photo:
            type: string
            example: https://cdn.foodstore.com/users/photo.png
          onboardingRequired:
            type: boolean
            example: false
          active:
            type: boolean
            example: true
          createdAt:
            type: string
            format: date-time
            example: '2026-05-24T18:30:00Z'
          updatedAt:
            type: string
            format: date-time
            nullable: true
            example: '2026-05-24T18:45:00Z'
          deletedAt:
            type: string
            format: date-time
            nullable: true
            example: null
        required:
          - userId
          - name
          - lastname
          - email
          - roles
          - photo
          - onboardingRequired
          - active
          - createdAt
      statusCode:
        $ref: ../attributes/code.yaml
      message:
        $ref: ../attributes/message.yaml
    required:
      - user
      - statusCode
      - message
