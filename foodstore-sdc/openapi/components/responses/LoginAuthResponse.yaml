description: Retorna los tokens de acceso del usuario autenticado.
content:
  application/json:
    schema:
      allOf:
        - $ref: ../schemas/model_response/StandardResponse.yaml
        - $ref: ../schemas/model_response/LoginAuthRes.yaml
    examples:
      Login-Exitoso:
        summary: Respuesta de login exitoso
        value:
          Data:
            Auth:
              accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access
              refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
            statusCode: 200
            message: Inicio de sesion exitoso
