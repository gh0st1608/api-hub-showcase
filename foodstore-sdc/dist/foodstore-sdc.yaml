components:
  securitySchemes:
    api_key:
      description: Codigo unico del Cliente.
      type: apiKey
      name: x-api-key
      in: header
    bearerAuth:
      description: Token JWT de acceso.
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Channel:
      name: channel
      in: header
      description: Canal de la aplicación.
      required: false
      schema:
        type: string
        enum:
          - APP
          - WEB
          - OIT
        minLength: 3
        maxLength: 20
        example: WEB
    ApiKey:
      name: x-api-key
      in: header
      description: Código único del Cliente.
      required: true
      schema:
        type: string
        minLength: 10
        maxLength: 40
        example: 125THE7YFR510TD2756
    Limit:
      name: limit
      in: query
      description: Numero maximo de registros a mostrar por pagina.
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        default: 10
        example: 10
    Cursor:
      name: cursor
      in: query
      description: Cursor de paginacion para consultar el siguiente bloque de resultados.
      required: false
      schema:
        type: string
        example: eyJsYXN0S2V5IjoiUFJPRFVDVCMxMjMifQ==
    UserId:
      name: userId
      in: query
      description: Identificador del usuario para filtrar recursos asociados.
      required: false
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
        pattern: '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
        example: 62977d46-7a50-41c9-8d84-38272ac2a8df
    Search:
      name: search
      in: query
      description: Texto de busqueda para filtrar productos o categorias.
      required: false
      schema:
        type: string
        example: hamburguesa
    CategoryId:
      name: categoryId
      in: query
      description: Identificador de categoria para filtrar productos.
      required: false
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
        pattern: '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
        example: 3d808990-5158-4af0-8a24-9326f59419a2
  schemas:
    LoginAuth:
      type: object
      description: Esquema para autenticar un usuario con credenciales.
      properties:
        Data:
          type: object
          properties:
            Auth:
              type: object
              properties:
                authType:
                  type: string
                  description: Tipo de autenticacion soportado por el microservicio.
                  enum:
                    - password
                  example: password
                email:
                  type: string
                  format: email
                  example: user@foodstore.com
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
                  example: Password123!
                captchaToken:
                  type: string
                  description: Token de captcha opcional.
                  example: 03AGdBq24-example-token
              required:
                - authType
                - email
                - password
          required:
            - Auth
      required:
        - Data
    StandardResponse:
      properties:
        Data:
          type: object
      required:
        - Data
    code:
      type: number
      format: double
      description: |
        Mapeo interno de los códigos de sistemas
      maximum: 999996
      minimum: 1
      example: 1099
    message:
      type: string
      description: |
        Mensaje descriptivo de la solicitud
      maxLength: 100
      example: mensaje descriptivo de la solicitud
    LoginAuthRes:
      type: object
      description: Devuelve los tokens de acceso del usuario autenticado.
      properties:
        Data:
          type: object
          properties:
            Auth:
              type: object
              properties:
                accessToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
              required:
                - accessToken
                - refreshToken
            statusCode:
              $ref: '#/components/schemas/code'
            message:
              $ref: '#/components/schemas/message'
          required:
            - Auth
            - statusCode
            - message
    StandardError:
      type: object
      properties:
        code:
          type: number
          format: double
          description: Código interno de error si se desea especificar
          example: '-'
        title:
          type: string
          description: >-
            Representa el código de estado HTTP obtenido del sistema proveedor,
            concatenado con su descripción.
          example: Descripción del error
        status:
          type: integer
          description: Código http de la respuesta
          example: 200
        dateTime:
          type: string
          description: >-
            Representa la fecha y hora del error presentado, se usa el formato
            YYYY-MM-DDTHH:mm:SSZ
          example: '2024-08-12T16:34:22'
        message:
          type: array
          description: Array de errores
          items:
            type: string
            example: >-
              Petición ejecutada satisfactoriamente, start javaw -jar
              project-1.0-SNAPSHOT.jar
      required:
        - code
        - title
        - message
        - status
        - dateTime
    StandardResponseError:
      properties:
        Error:
          $ref: '#/components/schemas/StandardError'
        Data:
          type: object
      required:
        - Error
        - Data
    RegisterUser:
      type: object
      description: Esquema para registrar un usuario.
      properties:
        Data:
          type: object
          properties:
            User:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@foodstore.com
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
                  example: Password123!
                name:
                  type: string
                  maxLength: 150
                  example: Juan Perez
              required:
                - email
                - password
                - name
          required:
            - User
      required:
        - Data
    VerifyEmail:
      type: object
      description: Esquema para enviar un codigo de verificacion por correo.
      properties:
        Data:
          type: object
          properties:
            User:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@foodstore.com
              required:
                - email
          required:
            - User
      required:
        - Data
    VerifyEmailRes:
      type: object
      description: Devuelve el estado de verificacion de correo.
      properties:
        Data:
          type: object
          properties:
            User:
              type: object
              properties:
                verifyEmail:
                  type: boolean
                  example: false
              required:
                - verifyEmail
            statusCode:
              $ref: '#/components/schemas/code'
            message:
              $ref: '#/components/schemas/message'
          required:
            - User
            - statusCode
            - message
    VerifyCode:
      type: object
      description: Esquema para validar un codigo de verificacion.
      properties:
        Data:
          type: object
          properties:
            User:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@foodstore.com
                code:
                  type: string
