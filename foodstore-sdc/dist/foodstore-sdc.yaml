openapi: 3.0.3
info:
  version: 1.0.0
  title: API de Negocio Foodstore
  description: >
    API de negocio Foodstore, donde se definen los alcances funcionales de los
    microservicios del ecosistema.
      Recursos:

        - Auth
        - Users
        - Preferences
        - Products
        - Categories
        - Stores
        - Orders
        - Couriers
        - Payments
        - Checkouts
  contact:
    name: Erick Galindo Aguilar
    email: erickmga123@gmail.com
    url: 'https://storage.googleapis.com/foodstore-design-dev/foodstore-dev.html'
    x-role: API Designer
  x-catalog:
    x-id-proxy: api-ne-foodstore
    x-id-product: internal-product-dev-foodstore
    x-id-catalog: api-ne-foodstore
servers:
  - url: 'https://api-dev.cuidaco.pe/api-ne-foodstore/v1'
    description: Servidor de ambiente Desarrollo
tags:
  - name: Auths
    description: |
      Agrupa los servicios de gestion sobre el recurso de: Auth
  - name: Users
    description: |
      Agrupa los servicios de gestion sobre el recurso de: User
  - name: Preferences
    description: |
      Agrupa los servicios de gestion sobre el recurso de: Preference
  - name: Products
    description: |
      Agrupa los servicios de gestion sobre el recurso de: Product
  - name: Categories
    description: |
      Agrupa los servicios de gestion sobre el recurso de: Category
  - name: Stores
    description: |
      Agrupa los servicios de gestion sobre el recurso de: Store
  - name: Orders
    description: |
      Agrupa los servicios de gestion sobre el recurso de: Order
  - name: Couriers
    description: |
      Agrupa los servicios de gestion sobre el recurso de: Courier
  - name: Payments
    description: |
      Agrupa los servicios de gestion sobre el recurso de: Payment
  - name: Checkouts
    description: |
      Agrupa los servicios de gestion sobre el recurso de: Cart
paths:
  /auth/login:
    parameters:
      - $ref: '#/components/parameters/Channel'
      - $ref: '#/components/parameters/ApiKey'
    post:
      summary: Login
      operationId: loginAuth
      description: |
        Procesos: Inicio de sesion con credenciales.

        Funcionalidad: Autenticar al usuario y devolver tokens.

        Objetivo: Permitir el acceso al microservicio.

        Comentarios:
      tags:
        - Auths
      requestBody:
        $ref: '#/components/requestBodies/LoginAuthReq'
      responses:
        '200':
          $ref: '#/components/responses/LoginAuthResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '407':
          $ref: '#/components/responses/ProxyAuthenticationResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '411':
          $ref: '#/components/responses/LengthRequiredResponse'
        '414':
          $ref: '#/components/responses/UriTooLongResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - api_key: []
  /auth/register:
    parameters:
      - $ref: '#/components/parameters/Channel'
      - $ref: '#/components/parameters/ApiKey'
    post:
      summary: Register User
      operationId: registerUser
      description: |
        Procesos: Registro de un usuario nuevo.

        Funcionalidad: Crear la cuenta y devolver tokens iniciales.

        Objetivo: Iniciar el flujo de onboarding del usuario.

        Comentarios:
      tags:
        - Auths
      requestBody:
        $ref: '#/components/requestBodies/RegisterUserReq'
      responses:
        '200':
          $ref: '#/components/responses/RegisterUserResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '407':
          $ref: '#/components/responses/ProxyAuthenticationResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '411':
          $ref: '#/components/responses/LengthRequiredResponse'
        '414':
          $ref: '#/components/responses/UriTooLongResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - api_key: []
  /auth/verify-email:
    parameters:
      - $ref: '#/components/parameters/Channel'
      - $ref: '#/components/parameters/ApiKey'
    post:
      summary: Verify Email
      operationId: verifyEmail
      description: |
        Procesos: Envio del codigo de verificacion por correo.

        Funcionalidad: Generar y notificar el codigo temporal al usuario.

        Objetivo: Validar la propiedad del correo electronico.

        Comentarios:
      tags:
        - Auths
      requestBody:
        $ref: '#/components/requestBodies/VerifyEmailReq'
      responses:
        '200':
          $ref: '#/components/responses/VerifyEmailResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '407':
          $ref: '#/components/responses/ProxyAuthenticationResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '411':
          $ref: '#/components/responses/LengthRequiredResponse'
        '414':
          $ref: '#/components/responses/UriTooLongResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - api_key: []
  /auth/verify-code:
    parameters:
      - $ref: '#/components/parameters/Channel'
      - $ref: '#/components/parameters/ApiKey'
    post:
      summary: Verify Code
      operationId: verifyCode
      description: |
        Procesos: Validacion del codigo de verificacion recibido.

        Funcionalidad: Confirmar la validez y vigencia del codigo temporal.

        Objetivo: Habilitar el paso siguiente del onboarding.

        Comentarios:
      tags:
        - Auths
      requestBody:
        $ref: '#/components/requestBodies/VerifyCodeReq'
      responses:
        '200':
          $ref: '#/components/responses/VerifyCodeResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '407':
          $ref: '#/components/responses/ProxyAuthenticationResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '411':
          $ref: '#/components/responses/LengthRequiredResponse'
        '414':
          $ref: '#/components/responses/UriTooLongResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - api_key: []
  /auth/set-password:
    parameters:
      - $ref: '#/components/parameters/Channel'
      - $ref: '#/components/parameters/ApiKey'
    post:
      summary: Set Password
      operationId: setPassword
      description: |
        Procesos: Registro o actualizacion de la contrasena del usuario.

        Funcionalidad: Persistir una nueva contrasena cifrada.

        Objetivo: Completar el acceso con credenciales.

        Comentarios:
      tags:
        - Auths
      requestBody:
        $ref: '#/components/requestBodies/SetPasswordReq'
      responses:
        '200':
          $ref: '#/components/responses/SetPasswordResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '407':
          $ref: '#/components/responses/ProxyAuthenticationResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '411':
          $ref: '#/components/responses/LengthRequiredResponse'
        '414':
          $ref: '#/components/responses/UriTooLongResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - api_key: []
  /auth/preferences:
    parameters:
      - $ref: '#/components/parameters/Channel'
      - $ref: '#/components/parameters/ApiKey'
    post:
      summary: Create Preferences
      operationId: createPreferences
      description: >
        Procesos: Registro de preferencias de categorias por usuario.


        Funcionalidad: Crear una o varias preferencias y marcar el onboarding
        como completado.


        Objetivo: Personalizar la experiencia del usuario.


        Comentarios:
      tags:
        - Preferences
      requestBody:
        $ref: '#/components/requestBodies/CreatePreferenceReq'
      responses:
        '200':
          $ref: '#/components/responses/CreatePreferenceResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '407':
          $ref: '#/components/responses/ProxyAuthenticationResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '411':
          $ref: '#/components/responses/LengthRequiredResponse'
        '414':
          $ref: '#/components/responses/UriTooLongResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - api_key: []
    get:
      summary: Get Preferences
      operationId: getPreferences
      description: |
        Procesos: Consulta paginada de preferencias registradas.

        Funcionalidad: Obtener preferencias por usuario o cursor.

        Objetivo: Visualizar el estado del onboarding del usuario.

        Comentarios:
      tags:
        - Preferences
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          $ref: '#/components/responses/GetPreferencesResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '407':
          $ref: '#/components/responses/ProxyAuthenticationResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '411':
          $ref: '#/components/responses/LengthRequiredResponse'
        '414':
          $ref: '#/components/responses/UriTooLongResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - api_key: []
  /auth/users:
    parameters:
      - $ref: '#/components/parameters/Channel'
      - $ref: '#/components/parameters/ApiKey'
    get:
      summary: Get Users
      operationId: getUsers
      description: |
        Procesos: Consulta paginada de usuarios.

        Funcionalidad: Recuperar usuarios por limite y cursor.

        Objetivo: Exponer un listado navegable del recurso User.

        Comentarios:
      tags:
        - Users
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          $ref: '#/components/responses/GetUsersResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '407':
          $ref: '#/components/responses/ProxyAuthenticationResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '411':
          $ref: '#/components/responses/LengthRequiredResponse'
        '414':
          $ref: '#/components/responses/UriTooLongResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - api_key: []
  '/auth/users/{id}':
    parameters:
      - $ref: '#/components/parameters/Channel'
      - $ref: '#/components/parameters/ApiKey'
      - name: id
        in: path
        description: Identificador unico del recurso User.
        required: true
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          pattern: '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
          example: 62977d46-7a50-41c9-8d84-38272ac2a8df
    get:
      summary: Get User By Id
      operationId: getUserById
      description: |
        Procesos: Consulta puntual de un usuario por identificador.

        Funcionalidad: Obtener el detalle del recurso User.

        Objetivo: Consultar la ficha de un usuario existente.

        Comentarios:
      tags:
        - Users
      responses:
        '200':
          $ref: '#/components/responses/GetUserResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '407':
          $ref: '#/components/responses/ProxyAuthenticationResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '411':
          $ref: '#/components/responses/LengthRequiredResponse'
        '414':
          $ref: '#/components/responses/UriTooLongResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - api_key: []
  /auth/me:
    parameters:
      - $ref: '#/components/parameters/Channel'
      - $ref: '#/components/parameters/ApiKey'
    get:
      summary: Get Me
      operationId: getMe
      description: |
        Procesos: Consulta del usuario autenticado.

        Funcionalidad: Obtener el perfil asociado al token de acceso.

        Objetivo: Exponer el contexto del usuario actual.

        Comentarios:
      tags:
        - Auths
      responses:
        '200':
          $ref: '#/components/responses/GetMeResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '407':
          $ref: '#/components/responses/ProxyAuthenticationResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '411':
          $ref: '#/components/responses/LengthRequiredResponse'
        '414':
          $ref: '#/components/responses/UriTooLongResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - api_key: []
          bearerAuth: []
  /shop/products:
    parameters:
      - $ref: '#/components/parameters/Channel'
      - $ref: '#/components/parameters/ApiKey'
    post:
      summary: Create Product
      operationId: createProduct
      description: >
        Procesos: Creacion de un producto nuevo.


        Funcionalidad: Registrar un producto con sus datos comerciales e
        ingredientes.


        Objetivo: Incorporar productos al catalogo del comercio.


        Comentarios:
      tags:
        - Products
      requestBody:
        $ref: '#/components/requestBodies/CreateProductReq'
      responses:
        '200':
          $ref: '#/components/responses/CreateProductResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '407':
          $ref: '#/components/responses/ProxyAuthenticationResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '411':
          $ref: '#/components/responses/LengthRequiredResponse'
        '414':
          $ref: '#/components/responses/UriTooLongResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - api_key: []
    get:
      summary: Get Products
      operationId: getProducts
      description: |
        Procesos: Consulta paginada de productos.

        Funcionalidad: Recuperar productos por texto, categoria y cursor.

        Objetivo: Exponer el catalogo del negocio de forma consultable.

        Comentarios:
      tags:
        - Products
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/CategoryId'
      responses:
        '200':
          $ref: '#/components/responses/GetProductsResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '407':
          $ref: '#/components/responses/ProxyAuthenticationResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '411':
          $ref: '#/components/responses/LengthRequiredResponse'
        '414':
          $ref: '#/components/responses/UriTooLongResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - api_key: []
  '/shop/products/{id}':
    parameters:
      - $ref: '#/components/parameters/Channel'
      - $ref: '#/components/parameters/ApiKey'
      - name: id
        in: path
        description: Identificador unico del recurso Product.
        required: true
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          pattern: '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
          example: 62977d46-7a50-41c9-8d84-38272ac2a8df
    get:
      summary: Get Product
      operationId: getProductById
      description: |
        Procesos: Consulta puntual de un producto por identificador.

        Funcionalidad: Obtener el detalle del producto solicitado.

        Objetivo: Exponer la ficha del producto del catalogo.

        Comentarios:
      tags:
        - Products
      responses:
        '200':
          $ref: '#/components/responses/GetProductResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '407':
          $ref: '#/components/responses/ProxyAuthenticationResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '411':
          $ref: '#/components/responses/LengthRequiredResponse'
        '414':
          $ref: '#/components/responses/UriTooLongResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - api_key: []
  /shop/categories:
    parameters:
      - $ref: '#/components/parameters/Channel'
      - $ref: '#/components/parameters/ApiKey'
    post:
      summary: Create Category
      operationId: createCategory
      description: |
        Procesos: Creacion de una categoria comercial.

        Funcionalidad: Registrar una categoria para clasificar productos.

        Objetivo: Organizar el catalogo del negocio.

        Comentarios:
      tags:
        - Categories
      requestBody:
        $ref: '#/components/requestBodies/CreateCategoryReq'
      responses:
        '200':
          $ref: '#/components/responses/CreateCategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '407':
          $ref: '#/components/responses/ProxyAuthenticationResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '411':
          $ref: '#/components/responses/LengthRequiredResponse'
        '414':
          $ref: '#/components/responses/UriTooLongResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - api_key: []
    get:
      summary: Get Categories
      operationId: getCategories
      description: |
        Procesos: Consulta paginada de categorias.

        Funcionalidad: Recuperar las categorias disponibles del catalogo.

        Objetivo: Exponer la clasificacion comercial del negocio.

        Comentarios:
      tags:
        - Categories
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          $ref: '#/components/responses/GetCategoriesResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '407':
          $ref: '#/components/responses/ProxyAuthenticationResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '411':
          $ref: '#/components/responses/LengthRequiredResponse'
        '414':
          $ref: '#/components/responses/UriTooLongResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      security:
        - api_key: []
  '/shop/stores/{id}/location':
    parameters:
      - $ref: '#/components/parameters/Channel'
      - $ref: '#/components/parameters/ApiKey'
      - name: id
        in: path
        description: Identificador unico del recurso Store.
        required: true
        schema:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          pattern: '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
          example: a0271854-eed8-486d-9ab4-74ef822aa1f4
    get:
      summary: Get Store Location
      operationId: getStoreLocation
